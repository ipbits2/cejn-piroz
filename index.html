<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پیرۆزباهیا جەژنا رەمەزانێ - Sarsing Town</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root { --gold: #d4af37; --white: #ffffff; }

        body {
            margin: 0; padding: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url('sarsink.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .container {
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px);
            padding: 40px 20px; border-radius: 25px; border: 2px solid var(--gold);
            text-align: center; width: 85%; max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        h1 { color: var(--gold); font-size: 2.3rem; margin-bottom: 5px; text-shadow: 2px 2px 4px black; }
        .input-group { margin: 30px 0; }
        input {
            width: 85%; padding: 15px; border-radius: 30px; border: 2px solid var(--gold);
            text-align: center; font-size: 1.1rem; background: white; color: #333;
        }

        .btn {
            background: var(--gold); color: #000; padding: 12px 40px; border: none;
            border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 15px;
            transition: 0.3s; font-size: 1.1rem;
        }
        .btn:hover { transform: scale(1.1); background: #f1c40f; }

        #result { display: none; margin-top: 20px; }
        #finalMessage { font-size: 1.7rem; font-weight: bold; line-height: 1.6; }

        .social-links { margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px; }
        .social-links a {
            color: white; font-size: 1.8rem; margin: 0 15px; transition: 0.3s; text-decoration: none;
        }
        .social-links a:hover { color: var(--gold); transform: translateY(-5px); }
        
        .share-btn {
            display: inline-block; background: #25d366; color: white; padding: 10px 20px;
            border-radius: 15px; text-decoration: none; margin-top: 15px; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setup">
        <h1>جەژنا وە پیرۆز بیت</h1>
        <p>ژ لایێ لاپەرێ <b>Sarsing Town</b></p>
        <div class="input-group">
            <input type="text" id="userName" placeholder="ناڤێ خۆ بنڤیسە...">
            <br>
            <button class="btn" onclick="start()">کارتا من چێکە</button>
        </div>
    </div>

    <div id="result">
        <div id="finalMessage"></div>
        <a href="#" class="share-btn" onclick="share()"><i class="fab fa-whatsapp"></i> نێرین بۆ واتسئاپێ</a>
    </div>

    <div class="social-links">
        <p style="font-size: 0.9rem; margin-bottom: 10px;">دگەل مە بن ل سۆشیال میدیایێ:</p>
        <a href="https://facebook.com/SarsingTown" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://instagram.com/SarsingTown" target="_blank"><i class="fab fa-instagram"></i></a>
    
    </div>
</div>

<script>
    function start() {
        let name = document.getElementById("userName").value;
        if(!name.trim()) return alert("تکایە ناڤەکێ بنڤیسە!");

        document.getElementById("setup").style.display = "none";
        document.getElementById("result").style.display = "block";
        document.getElementById("finalMessage").innerHTML = 
            "🌹 جەژنا تە پیرۆز بیت 🌹<br><span style='color:var(--gold)'>" + name + "</span>" +
            "<br><p style='font-size:1.1rem'>ئەڤە پیرۆزباهیا منە تایبەت بۆ تە</p>";

        var end = Date.now() + 4000;
        (function frame() {
            confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#d4af37', '#ffffff'] });
            confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#d4af37', '#ffffff'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());
    }

    function share() {
        let url = window.location.href;
        window.open("https://wa.me/?text=" + encodeURIComponent("جەژن پیرۆز بیت! کارتەکا پیرۆزباهیێ بۆ تە یا ل ڤێرێ: " + url));
    }
</script>

</body>
</html>
