<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پیرۆزباهیا جەژنا رەمەزانێ - Sarsing Town</title>
    <style>
        :root {
            --primary-color: #1a5f7a;
            --gold: #d4af37;
        }
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a5f7a 0%, #002b36 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px 20px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            text-align: center;
            width: 85%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: var(--gold); font-size: 2rem; margin-bottom: 10px; }
        p.msg { font-size: 1.2rem; line-height: 1.6; }
        
        .input-group { margin: 30px 0; }
        input {
            width: 80%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            text-align: center;
            font-size: 1.1rem;
            outline: none;
        }
        .btn {
            background: var(--gold);
            color: #000;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); background: #f1c40f; }

        #result {
            margin-top: 25px;
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            display: none;
        }
        .share-btn {
            display: inline-block;
            margin-top: 20px;
            color: #25d366;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>جەژنا وە پیرۆز بیت</h1>
    <p class="msg">هەمی روژێن وە هەر خوشی و شادی بن<br>ژ لایێ لاپەرێ <b>Sarsing Town</b></p>
    
    <div class="input-group" id="inputSection">
        <input type="text" id="userName" placeholder="ناڤێ خۆ لێرە بنڤیسە...">
        <br>
        <button class="btn" onclick="generateGreeting()">کارتێ من چێکە</button>
    </div>

    <div id="result">
        <div id="finalMessage"></div>
        <a href="#" class="share-btn" onclick="shareToWhatsApp()">نێرین بۆ WhatsApp 📲</a>
    </div>
</div>

<script>
    function generateGreeting() {
        let name = document.getElementById("userName").value;
        if(name.trim() === "") {
            alert("تکایە ناڤەکێ بنڤیسە!");
            return;
        }
        document.getElementById("inputSection").style.display = "none";
        document.getElementById("result").style.display = "block";
        document.getElementById("finalMessage").innerHTML = "جەژن پیرۆز بیت <br> <span style='color:#d4af37'>" + name + "</span>";
    }

    function shareToWhatsApp() {
        let name = document.getElementById("userName").value;
        let url = window.location.href;
        let text = "جەژن پیرۆز بیت! ئەڤە پیرۆزباهیا منە بۆ تە: " + url;
        window.open("https://wa.me/?text=" + encodeURIComponent(text));
    }
</script>

</body>
</html>
